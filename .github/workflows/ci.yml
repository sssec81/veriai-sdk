name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Build, Lint and Test Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sources
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Stable Rust Toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable, 2026-07-16
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Linter
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Workspace Tests
        run: cargo test --workspace --all-targets

      - name: Install dependency-security tools
        run: |
          install_tool() {
            binary="$1"
            package="$2"
            version="$3"
            if ! command -v "$binary" >/dev/null || ! "$binary" --version | grep -Fq "$version"; then
              cargo install "$package@$version" --locked --force
            fi
          }
          install_tool cargo-audit cargo-audit 0.22.2
          install_tool cargo-deny cargo-deny 0.20.2
          install_tool cargo-vet cargo-vet 0.10.2

      - name: Audit known dependency vulnerabilities
        run: cargo audit

      - name: Enforce dependency policy
        run: cargo deny check

      - name: Verify dependency audits
        run: cargo vet --locked

      - name: Build WASM Verifier
        run: cargo build -p veriai-wasm --target wasm32-unknown-unknown --release

      - name: Check WASM Compressed Size
        run: |
          size=$(gzip -c target/wasm32-unknown-unknown/release/veriai_wasm.wasm | wc -c)
          test "$size" -le 350000

      - name: Verify Production Release Compilation
        run: cargo build --release --no-default-features --features real-hardware
